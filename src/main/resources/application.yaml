server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: payment-service
  data:
    web:
      pageable:
        default-page-size: 20      # Size mặc định nếu frontend không truyền lên
        max-page-size: 10000

  datasource:
    url: jdbc:oracle:thin:@10.145.48.96:1521:way4db
    username: ${DB_USERNAME:INT}
    password: ${DB_PASSWORD:way4}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    default-property-inclusion: non_null

soap:
  webservice:
    url: ${SOAP_URL:http://10.145.48.222:17000/webservice_int/ws}
    connect-timeout: 10000
    read-timeout: 30000

# ========================
# Security Configuration
# ========================
security:
  jwt:
    secret: ${JWT_SECRET:payment-card-issuing-system-secret-key-must-be-at-least-256-bits-long-hmac-sha256}
    access-token-expiration: 900000      # 15 minutes
    refresh-token-expiration: 604800000  # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  totp:
    enabled: ${TOTP_ENABLED:true}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: INFO
    com.payment.service.security: DEBUG
