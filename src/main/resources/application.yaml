server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: payment-service
  data:
    web:
      pageable:
        default-page-size: 20      # Size mặc định nếu frontend không truyền lên
        max-page-size: 10000

  datasource:
    url: jdbc:oracle:thin:@//10.145.48.97:1521/way4db
    username: INTN
    password: way4
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    default-property-inclusion: non_null

soap:
  webservice:
    url: http://10.145.48.222:17000/webservice_int/ws
    connect-timeout: 10000
    read-timeout: 30000

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
